# Use this file in Coolify as your custom nginx config.
# It must be included inside http.d/ (snippet), so it must NOT contain
# top-level directives like "events" or "http" — only "server" and contents.

server {
    listen 8000;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
    }

    location ~ /\.ht {
        deny all;
    }
}
